<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roam.ai - Travel Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Unbounded:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--sand:#F7F3EE;--sand2:#EFE7DE;--sand3:#D8C9BC;
--ink:#2B2118;--ink2:#4A3A2F;--ink3:#6B5A4E;
--teal:#1FA4A9;--teal2:#178488;--teal3:#D6F0F1;
--amber:#F4A261;--amber2:#E76F51;--amber3:#FDE6D3;
--rose:#D64545;--rose2:#B93737;--rose3:#F9E1DC;
--coral:#E07A5F;--coral2:#C9654A;--coral3:#F9E1DC;
--success:#4CAF7A;--success3:#E4F4EC;
--info:#1FA4A9;
--white:#FCFAF7;--card:#FBF7F2;
--radius:16px;--radius-sm:10px;
--shadow:0 10px 30px rgba(43,33,24,0.08);
--shadow-lg:0 18px 44px rgba(43,33,24,0.14);
--font-body:'Poppins',sans-serif;
--font-display:'Unbounded',sans-serif;
--font-title:var(--font-display);
}
body{font-family:var(--font-body);background:var(--sand);color:var(--ink);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,h4,.display{font-family:var(--font-display);}
body *{font-family:var(--font-body) !important;}
.nav-tab,.avatar,.hero-tag,.q-label,.range-val,.step-counter,.rec-name,.filter-label,.dest-banner h2,.section-title,.airport-code,.price,.hotel-name,.modal h3,.booking-summary .line.total,.confirmed h3,.ref-code,.trip-sum-val,.activity-name,.translate-result h4,.auth-card h2,.section-head h2,.mobile-tab,.inbox-banner h4,.inbox-request-info strong,.connected-badge{
  font-family:var(--font-display) !important;
}
.logo{
  font-family:var(--font-title) !important;
  font-size:2rem;
  font-weight:400;
  letter-spacing:0.01em;
  line-height:1;
}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--sand2);padding:0 2rem;}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{font-family:var(--font-title) !important;font-size:2rem;font-weight:400;color:var(--ink);letter-spacing:0.01em;}
.logo span{color:var(--teal);}
.nav-tabs{display:flex;gap:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--sand2);background:var(--sand);}
.nav-tab{padding:8px 20px;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.3px;cursor:pointer;border:none;color:var(--ink2);transition:all 0.25s ease;white-space:nowrap;position:relative;isolation:isolate;}
.nav-tab::before{content:'';position:absolute;inset:0;opacity:.28;transition:opacity .25s ease,transform .25s ease;z-index:-1;}
.nav-tab:hover::before{opacity:.42;transform:translateY(-1px);}
.nav-tab.active{color:var(--ink);box-shadow:inset 0 1px 0 rgba(255,255,255,.28);}
.nav-tab.active::before{opacity:1;}
.nav-tab:disabled{opacity:0.42;cursor:not-allowed;filter:saturate(.75);}
#tab-plan::before{background:linear-gradient(135deg,#E8F6F4 0%, #D6F0F1 100%);}
#tab-book::before{background:linear-gradient(135deg,#FCEFE3 0%, #FDE6D3 100%);}
#tab-enjoy::before{background:linear-gradient(135deg,#FBEDE8 0%, #F9E1DC 100%);}
#tab-connect::before{background:linear-gradient(135deg,#FAEDEA 0%, #F9E1DC 100%);}
#tab-plan.active,#tab-book.active,#tab-enjoy.active,#tab-connect.active{text-shadow:none;}
#tab-plan.active{box-shadow:0 6px 16px rgba(31,164,169,.10);}
#tab-book.active{box-shadow:0 6px 16px rgba(244,162,97,.10);}
#tab-enjoy.active{box-shadow:0 6px 16px rgba(224,122,95,.10);}
#tab-connect.active{box-shadow:0 6px 16px rgba(199,125,139,.10);}
.nav-right{display:flex;align-items:center;gap:12px;}
.user-badge{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--ink3);}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--teal);color:var(--white);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;}
.btn-primary{background:var(--ink);color:var(--white);}
.btn-primary:hover{background:var(--ink2);}
.btn-teal{background:var(--teal);color:var(--white);}
.btn-teal:hover{background:var(--teal2);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--sand3);}
.btn-outline:hover{background:var(--sand);border-color:var(--ink3);}
.btn-sm{padding:7px 14px;font-size:0.82rem;}
.btn-lg{padding:14px 28px;font-size:1rem;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* PAGE CONTAINER */
.page{display:none;max-width:1100px;margin:0 auto;padding:2.5rem 2rem;}
.page.active{display:block;}

/* HERO SECTION */
.hero{text-align:center;padding:4rem 2rem 3rem;max-width:700px;margin:0 auto;}
.hero-tag{display:inline-block;background:var(--teal3);color:var(--teal);font-size:0.78rem;font-weight:600;font-family:'Syne',sans-serif;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:1.5rem;}
.hero h1{font-size:3.2rem;font-weight:800;line-height:1.15;letter-spacing:-1.5px;margin-bottom:1.2rem;color:var(--ink);}
.hero h1 em{font-style:normal;color:var(--teal);}
.hero p{font-size:1.1rem;color:var(--ink3);line-height:1.7;font-weight:300;}

/* CARD */
.card{background:var(--card);border-radius:var(--radius);border:1px solid rgba(107,90,78,0.14);padding:1.5rem;box-shadow:var(--shadow);}
.card+.card{margin-top:1rem;}

/* QUESTION FORM */
.q-form{max-width:680px;margin:0 auto;}
.q-step{animation:fadeUp 0.35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-label{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--ink);}
.q-sub{font-size:0.88rem;color:var(--ink3);margin-top:-0.5rem;margin-bottom:1rem;}
.chip-grid{display:flex;flex-wrap:wrap;gap:10px;}
.chip{padding:10px 18px;border-radius:100px;border:1.5px solid var(--sand3);background:var(--white);font-size:0.88rem;cursor:pointer;transition:all 0.18s;font-weight:400;color:var(--ink2);}
.chip:hover{border-color:var(--teal);color:var(--teal);}
.chip.selected{background:var(--ink);color:var(--white);border-color:var(--ink);}
input[type=range]{width:100%;accent-color:var(--teal);height:4px;margin:1rem 0;}
.range-labels{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--ink3);}
.range-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem;color:var(--teal);text-align:center;margin:0.5rem 0;}
.progress-bar{height:4px;background:var(--sand2);border-radius:4px;margin-bottom:2rem;}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width 0.4s ease;}
.step-counter{text-align:right;font-size:0.8rem;color:var(--ink3);margin-bottom:0.75rem;font-family:'Syne',sans-serif;}

/* RECOMMENDATION CARDS */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;}
.rec-card{background:var(--card);border-radius:var(--radius);border:1px solid rgba(107,90,78,0.14);overflow:hidden;box-shadow:var(--shadow);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;cursor:pointer;}
.rec-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(31,164,169,0.22);}
.rec-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative;overflow:hidden;}
.place-visual{font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif !important;font-weight:400 !important;line-height:1;display:inline-block;}
.place-flag{width:88px;height:66px;object-fit:cover;border-radius:14px;box-shadow:0 10px 24px rgba(43,33,24,0.12);display:block;}
.rec-body{padding:1.25rem;}
.rec-name{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:0.25rem;}
.rec-country{font-size:0.82rem;color:var(--ink3);margin-bottom:0.75rem;}
.rec-why{font-size:0.88rem;color:var(--ink2);line-height:1.6;margin-bottom:1rem;}
.rec-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.tag{padding:4px 12px;border-radius:100px;font-size:0.75rem;font-weight:500;}
.tag-teal{background:var(--teal3);color:var(--teal);}
.tag-amber{background:var(--amber3);color:var(--amber);}
.tag-rose{background:var(--rose3);color:var(--rose);}
.match-score{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--ink3);}
.match-bar{flex:1;height:4px;background:var(--sand2);border-radius:4px;}
.match-fill{height:100%;background:var(--teal2);border-radius:4px;}

/* FILTERS */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2rem;align-items:center;}
.filter-label{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);margin-right:4px;}
.filter-chip{padding:7px 16px;border-radius:100px;border:1.5px solid var(--sand3);background:var(--white);font-size:0.82rem;cursor:pointer;transition:all 0.18s;color:var(--ink2);}
.filter-chip.active{background:var(--teal);color:var(--white);border-color:var(--teal);}

/* BOOK PAGE */
.book-header{margin-bottom:2rem;}
.dest-banner{background:var(--ink);color:var(--white);border-radius:var(--radius);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.dest-banner h2{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;}
.dest-banner p{font-size:0.9rem;opacity:0.7;margin-top:4px;}
.section-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--sand2);}
.flight-card,.hotel-card{background:var(--card);border:1.5px solid rgba(107,90,78,0.12);border-radius:var(--radius);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;cursor:pointer;transition:all 0.2s;flex-wrap:wrap;gap:1rem;box-shadow:0 8px 22px rgba(43,33,24,0.06);}
.flight-card.selected,.hotel-card.selected{border-color:var(--teal);background:var(--teal3);}
.flight-card:hover,.hotel-card:hover{border-color:var(--teal);}
.flight-route{display:flex;align-items:center;gap:12px;}
.airport-code{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;}
.flight-arrow{color:var(--ink3);font-size:0.8rem;}
.flight-meta{font-size:0.82rem;color:var(--ink3);}
.price{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--ink);}
.price small{font-size:0.75rem;font-weight:400;color:var(--ink3);}
.stars{color:var(--amber2);letter-spacing:-1px;}
.hotel-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
.hotel-meta{font-size:0.82rem;color:var(--ink3);margin-top:4px;}
.amenity-pill{display:inline-block;padding:3px 10px;background:var(--sand);border-radius:100px;font-size:0.75rem;color:var(--ink3);margin:3px 3px 0 0;}
.select-indicator{width:24px;height:24px;border-radius:50%;border:2px solid var(--sand3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.selected .select-indicator{background:var(--teal);border-color:var(--teal);color:var(--white);}

/* PAYMENT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,21,16,0.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.modal{background:var(--white);border-radius:var(--radius);max-width:480px;width:100%;padding:2rem;animation:popIn 0.3s ease;}
@keyframes popIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
.modal h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:0.25rem;}
.modal-sub{font-size:0.88rem;color:var(--ink3);margin-bottom:1.5rem;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:0.82rem;font-weight:500;color:var(--ink3);margin-bottom:6px;}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1.5px solid var(--sand2);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.92rem;background:var(--white);color:var(--ink);outline:none;transition:border 0.2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.booking-summary{background:var(--sand);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1.5rem;font-size:0.88rem;}
.booking-summary .line{display:flex;justify-content:space-between;padding:4px 0;color:var(--ink3);}
.booking-summary .line.total{font-family:'Syne',sans-serif;font-weight:700;color:var(--ink);font-size:1rem;border-top:1px solid var(--sand2);margin-top:8px;padding-top:10px;}
.confirmed{text-align:center;padding:2rem 0;}
.confirmed .tick{width:60px;height:60px;border-radius:50%;background:var(--teal);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1rem;}
.confirmed h3{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--ink);margin-bottom:0.5rem;}
.ref-code{background:var(--sand);padding:10px 20px;border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--teal);display:inline-block;margin:1rem 0;}

/* ENJOY PAGE */
.trip-summary-banner{background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 100%);color:var(--white);border-radius:var(--radius);padding:2rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;}
.trip-sum-item{font-size:0.85rem;opacity:0.7;margin-bottom:4px;}
.trip-sum-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;}
.activity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.activity-card{background:var(--card);border-radius:var(--radius);border:1px solid rgba(107,90,78,0.12);padding:1.25rem;box-shadow:0 8px 22px rgba(43,33,24,0.06);transition:transform 0.2s,box-shadow 0.2s;}
.activity-card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(43,33,24,0.1);}
.activity-icon{font-size:2.2rem;margin-bottom:0.75rem;}
.activity-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:0.4rem;}
.activity-meta{font-size:0.82rem;color:var(--ink3);margin-bottom:0.75rem;line-height:1.5;}
.activity-badges{display:flex;flex-wrap:wrap;gap:6px;}

/* IMAGE TRANSLATE */
.translate-zone{border:2px dashed var(--sand3);border-radius:var(--radius);padding:3rem 2rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--white);}
.translate-zone:hover,.translate-zone.drag-over{border-color:var(--teal);background:var(--teal3);}
.translate-zone p{color:var(--ink3);font-size:0.9rem;margin-top:0.5rem;}
.translate-result{background:var(--card);border-radius:var(--radius);border:1px solid var(--sand2);padding:1.5rem;margin-top:1rem;}
.translate-result h4{font-family:'Syne',sans-serif;font-weight:700;margin-bottom:0.75rem;color:var(--teal);}
.translate-result p{font-size:0.92rem;line-height:1.7;color:var(--ink2);}
.uploaded-img{max-width:100%;max-height:250px;border-radius:var(--radius-sm);margin-bottom:1rem;display:block;margin:0 auto 1rem;}

/* LOADING */
.loading{display:flex;align-items:center;gap:10px;color:var(--ink3);font-size:0.9rem;padding:2rem;}
.spinner{width:20px;height:20px;border:2.5px solid var(--sand2);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.skeleton{background:var(--sand2);border-radius:8px;animation:shimmer 1.2s ease infinite;}
@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}

/* AUTH */
.auth-card{max-width:420px;margin:3rem auto;background:var(--card);border-radius:var(--radius);padding:2.5rem;box-shadow:var(--shadow-lg);}
.auth-card h2{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:0.5rem;}
.auth-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:2px solid var(--sand2);}
.auth-tab{padding:10px 24px;cursor:pointer;font-weight:500;font-size:0.9rem;color:var(--ink3);border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
.auth-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.divider{text-align:center;color:var(--ink3);font-size:0.82rem;margin:1rem 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--sand2);}
.divider::before{left:0}
.divider::after{right:0}
#auth-modal{position:fixed;inset:0;align-items:center;justify-content:center;overflow:hidden;padding:1rem;}
#auth-modal .modal{width:min(560px,100%);max-height:calc(100vh - 2rem);overflow-y:auto;margin:0;overscroll-behavior:contain;}
#auth-modal textarea{max-width:100%;}

/* SECTIONS */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.section-head h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:2.2rem;}
  .nav-tabs{display:none;}
  .mobile-tabs{display:flex!important;}
  .rec-grid{grid-template-columns:1fr;}
  .flight-card,.hotel-card{flex-direction:column;align-items:flex-start;}
  #auth-modal{padding:0.5rem;}
  #auth-modal .modal{padding:1.25rem;max-height:calc(100vh - 1rem);}
}
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--sand2);z-index:100;padding:0.5rem 0;}
.mobile-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;font-size:0.7rem;color:var(--ink3);font-family:'Syne',sans-serif;font-weight:600;border:none;background:transparent;position:relative;transition:all .25s ease;}
.mobile-tab::before{content:'';position:absolute;left:8px;right:8px;top:4px;bottom:4px;border-radius:14px;opacity:.14;z-index:-1;transition:opacity .25s ease, transform .25s ease;}
.mobile-tab.active{color:var(--ink);transform:translateY(-1px);}
.mobile-tab.active::before{opacity:1;}
#mtab-plan::before{background:linear-gradient(135deg,#E8F6F4 0%, #D6F0F1 100%);}
#mtab-book::before{background:linear-gradient(135deg,#FCEFE3 0%, #FDE6D3 100%);}
#mtab-enjoy::before{background:linear-gradient(135deg,#FBEDE8 0%, #F9E1DC 100%);}
#mtab-connect::before{background:linear-gradient(135deg,#FAEDEA 0%, #F9E1DC 100%);}

/* CONNECTION STATES */
.connect-btn-group{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.btn-connect{background:var(--teal);color:var(--white);}
.btn-connect:hover{background:var(--teal2);}
.btn-pending{background:var(--amber3);color:var(--amber);border:1.5px solid var(--amber2);cursor:default;}
.btn-pending:hover{background:var(--amber3);}
.btn-connected{background:var(--sand);color:var(--teal);border:1.5px solid var(--teal);cursor:default;}
.inbox-banner{background:var(--amber3);border:1.5px solid var(--amber2);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;}
.inbox-banner h4{font-family:'Syne',sans-serif;font-weight:700;color:var(--amber);margin-bottom:2px;}
.inbox-banner p{font-size:0.85rem;color:var(--ink2);}
.inbox-request{background:var(--card);border:1px solid var(--sand2);border-radius:var(--radius-sm);padding:1rem 1.25rem;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;}
.inbox-request-info strong{font-family:'Syne',sans-serif;font-size:0.95rem;}
.inbox-request-info p{font-size:0.82rem;color:var(--ink3);margin-top:3px;}

<script src="/socket.io/socket.io.js"></script>
<script>
// ===== STATE =====
const STATE = {
  user: null,
  preferences: null,
  enjoyPrefs: null,
  selectedDest: null,
  selectedFlight: null,
  selectedHotel: null,
  planFilters: [],
  bookFlightFilters: [],
  bookHotelFilters: [],
  enjoyFilters: [],
  connectFilters: [],
  currentPage: 'plan',
  planRecs: null,
  bookData: null,
  bookPlanKey: null,
  enjoyData: null,
  enjoyPlanKey: null,
  connectData: null,
  recommendedUsers: [],
  groupData: [],
  acceptedConnections: [],
  outgoingRequests: [],
  bookingRef: null,
  connections: {},
  connectionRequests: [],
  unreadMessages: {},
  lastMessageUserId: null,
  socket: null,
  activeChatUserId: null,
  activeGroupChatId: null
};

const AUTH_TOKEN_KEY = 'wanderai_token';
const APP_STATE_KEY = 'wanderai_state';
const API_BASE = '';

function buildStateSnapshot(){
  return {
    preferences: STATE.preferences,
    enjoyPrefs: STATE.enjoyPrefs,
    selectedDest: STATE.selectedDest,
    selectedFlight: STATE.selectedFlight,
    selectedHotel: STATE.selectedHotel,
    planRecs: STATE.planRecs,
    bookData: STATE.bookData,
    bookPlanKey: STATE.bookPlanKey,
    enjoyData: STATE.enjoyData,
    enjoyPlanKey: STATE.enjoyPlanKey,
    connectData: STATE.connectData,
    recommendedUsers: STATE.recommendedUsers,
    groupData: STATE.groupData,
    acceptedConnections: STATE.acceptedConnections,
    outgoingRequests: STATE.outgoingRequests,
    bookingRef: STATE.bookingRef,
    connections: STATE.connections,
    connectionRequests: STATE.connectionRequests,
    unreadMessages: STATE.unreadMessages,
    lastMessageUserId: STATE.lastMessageUserId
  };
}

function getStateStorageKey(userId){
  return userId ? `${APP_STATE_KEY}_${userId}` : APP_STATE_KEY;
}

function getCurrentPlanKey(){
  if(!STATE.selectedDest || !STATE.preferences) return null;
  return JSON.stringify({
    destination: {
      name: STATE.selectedDest.name,
      country: STATE.selectedDest.country,
      emoji: STATE.selectedDest.emoji
    },
    preferences: STATE.preferences
  });
}

function getCountryFlagCode(country){
  const countryCodes = {
    Portugal:'PT', Japan:'JP', Colombia:'CO', Thailand:'TH', 'South Africa':'ZA',
    Indonesia:'ID', Greece:'GR', 'French Polynesia':'PF', 'United Kingdom':'GB',
    Morocco:'MA', Iceland:'IS', Mexico:'MX', Croatia:'HR', 'New Zealand':'NZ',
    Fiji:'FJ',
    Canada:'CA', Spain:'ES', Italy:'IT', France:'FR', Germany:'DE', Ireland:'IE',
    Switzerland:'CH', Austria:'AT', Australia:'AU', Vietnam:'VN', Singapore:'SG',
    Malaysia:'MY', Turkey:'TR', Egypt:'EG', Brazil:'BR', Peru:'PE', Argentina:'AR',
    Chile:'CL', 'United States':'US', USA:'US', Netherlands:'NL', Belgium:'BE'
  };
  return countryCodes[country] || '';
}

function getPlanVisual(place = {}){
  const code = getCountryFlagCode(place.country);
  if(code) return { type:'flag', code };
  const text = [
    place.name || '',
    place.country || '',
    ...(place.highlights || []),
    place.whyMatch || ''
  ].join(' ').toLowerCase();
  const visualMap = [
    {pattern: /(beach|island|coast|sea|ocean)/, emoji:'🏖️'},
    {pattern: /(temple|shrine|palace|castle|old town|historic|cathedral|medina)/, emoji:'🏛️'},
    {pattern: /(mountain|alps|volcano|hike|trail|summit|fjord)/, emoji:'🏔️'},
    {pattern: /(food|market|wine|cuisine|street food|coffee)/, emoji:'🍽️'},
    {pattern: /(art|museum|gallery|design)/, emoji:'🎨'},
    {pattern: /(nightlife|bar|club|social)/, emoji:'🌃'},
    {pattern: /(wellness|spa|yoga|retreat)/, emoji:'🧘'},
    {pattern: /(wildlife|nature|jungle|safari|forest)/, emoji:'🌿'},
    {pattern: /(desert|dune)/, emoji:'🏜️'},
    {pattern: /(city|urban|architecture)/, emoji:'🏙️'}
  ];
  const match = visualMap.find((item) => item.pattern.test(text));
  return { type:'emoji', value: match ? match.emoji : '✈️' };
}

function getPlaceVisualMarkup(place = {}){
  const visual = getPlanVisual(place);
  if(visual.type === 'flag'){
    const src = `https://flagcdn.com/w80/${visual.code.toLowerCase()}.png`;
    return `<img class="place-flag" src="${src}" alt="${place.country || 'Flag'} flag" loading="lazy"/>`;
  }
  return `<span class="place-visual">${visual.value}</span>`;
}

function getRegionForCountry(country){
  const regionMap = {
    Portugal:'Europe', Spain:'Europe', Italy:'Europe', France:'Europe', Germany:'Europe', Ireland:'Europe',
    Switzerland:'Europe', Austria:'Europe', Greece:'Europe', Croatia:'Europe', Iceland:'Europe', Belgium:'Europe',
    Netherlands:'Europe', 'United Kingdom':'Europe',
    Japan:'Asia', Thailand:'Asia', Indonesia:'Asia', Vietnam:'Asia', Singapore:'Asia', Malaysia:'Asia', Nepal:'Asia', Turkey:'Asia',
    Egypt:'Africa', Morocco:'Africa', 'South Africa':'Africa',
    Mexico:'North America', Canada:'North America', 'United States':'North America', USA:'North America',
    Colombia:'South America', Brazil:'South America', Peru:'South America', Argentina:'South America', Chile:'South America',
    Australia:'Australia', 'New Zealand':'Australia', Fiji:'Australia', 'French Polynesia':'Australia'
  };
  return regionMap[country] || '';
}

function filterPlanRecsByRegion(recs = [], selectedRegions = []){
  if(!Array.isArray(recs) || !Array.isArray(selectedRegions) || !selectedRegions.length || selectedRegions.includes('Anywhere!')){
    return recs;
  }
  return recs.filter((rec) => selectedRegions.includes(getRegionForCountry(rec.country)));
}

function applyStateSnapshot(snapshot = {}){
  Object.assign(STATE, snapshot);
  if(!STATE.connections) STATE.connections = {};
  if(!STATE.connectionRequests) STATE.connectionRequests = [];
  if(!STATE.outgoingRequests) STATE.outgoingRequests = [];
  if(!STATE.unreadMessages) STATE.unreadMessages = {};
  if(!STATE.acceptedConnections) STATE.acceptedConnections = [];
  if(!STATE.recommendedUsers) STATE.recommendedUsers = [];
  if(!STATE.groupData) STATE.groupData = [];
  if(!STATE.activeGroupChatId) STATE.activeGroupChatId = null;
}

function clearUserFlowState(){
  STATE.preferences = null;
  STATE.enjoyPrefs = null;
  STATE.selectedDest = null;
  STATE.selectedFlight = null;
  STATE.selectedHotel = null;
  STATE.planRecs = null;
  STATE.bookData = null;
  STATE.bookPlanKey = null;
  STATE.enjoyData = null;
  STATE.enjoyPlanKey = null;
  STATE.connectData = null;
  STATE.recommendedUsers = [];
  STATE.groupData = [];
  STATE.acceptedConnections = [];
  STATE.outgoingRequests = [];
  STATE.bookingRef = null;
  STATE.connections = {};
  STATE.connectionRequests = [];
  STATE.unreadMessages = {};
  STATE.lastMessageUserId = null;
  STATE.activeChatUserId = null;
  STATE.activeGroupChatId = null;
}

function save(){
  const key = getStateStorageKey(STATE.user?.id);
  localStorage.setItem(key, JSON.stringify(buildStateSnapshot()));
}

function load(){
  try{
    const d = JSON.parse(localStorage.getItem(APP_STATE_KEY)||'{}');
    applyStateSnapshot(d);
  }catch(e){}
}

function loadUserState(userId){
  clearUserFlowState();
  try{
    const raw = localStorage.getItem(getStateStorageKey(userId));
    if(raw){
      applyStateSnapshot(JSON.parse(raw));
      return;
    }
  }catch(e){}
  save();
}

// ===== LOCAL OLLAMA API =====
const OLLAMA_API = API_BASE;
const OLLAMA_MODEL = 'qwen2.5:1.5b'; // Text model for planning/chat features

function setToken(token){
  if(token) localStorage.setItem(AUTH_TOKEN_KEY, token);
  else localStorage.removeItem(AUTH_TOKEN_KEY);
}

function getToken(){
  return localStorage.getItem(AUTH_TOKEN_KEY);
}

async function apiFetch(path, options={}){
  const headers = {'Content-Type':'application/json', ...(options.headers||{})};
  const token = getToken();
  if(token) headers.Authorization = `Bearer ${token}`;
  const response = await fetch(`${API_BASE}${path}`, {...options, headers});
  const text = await response.text();
  const data = text ? JSON.parse(text) : {};
  if(!response.ok) throw new Error(data.error || `Request failed (${response.status})`);
  return data;
}

function normalizeUser(user){
  if(!user) return null;
  return {
    ...user,
    id: String(user.id),
    post: user.post || user.bio || `${user.name} is looking for a travel companion.`,
    interests: Array.isArray(user.interests) ? user.interests : [],
    type: user.type || 'seeking',
    isRealUser: true
  };
}

function getCompanionById(id){
  return (STATE.connectData||[]).find(c => String(c.id) === String(id))
    || (STATE.connectionRequests||[]).find(c => String(c.id) === String(id))
    || (STATE.outgoingRequests||[]).find(c => String(c.id) === String(id));
}

async function loadCurrentUser(){
  const token = getToken();
  if(!token){
    STATE.user = null;
    return;
  }
  try{
    const data = await apiFetch('/api/auth/me', {method:'GET'});
    STATE.user = normalizeUser(data.user);
  }catch(e){
    setToken('');
    STATE.user = null;
  }
}

async function refreshConnections(){
  if(!STATE.user){
    STATE.connections = {};
    STATE.connectionRequests = [];
    STATE.outgoingRequests = [];
    STATE.connectData = null;
    return;
  }
  const [usersData, connectionsData] = await Promise.all([
    apiFetch('/api/users', {method:'GET'}),
    apiFetch('/api/connections', {method:'GET'})
  ]);
  STATE.connectData = (usersData.users||[]).map(normalizeUser);
  STATE.connectionRequests = (connectionsData.pendingIncoming||[]).map(normalizeUser);
  STATE.outgoingRequests = (connectionsData.pendingOutgoing||[]).map(normalizeUser);
  STATE.acceptedConnections = (connectionsData.accepted||[]).map(normalizeUser);
  STATE.connections = connectionsData.statusMap || {};
  save();
}

function setupSocket(){
  if(!STATE.user || !getToken()){
    if(STATE.socket){
      STATE.socket.disconnect();
      STATE.socket = null;
    }
    return;
  }

  if(STATE.socket){
    STATE.socket.disconnect();
  }

  STATE.socket = io({
    auth: { token: getToken() }
  });

  STATE.socket.on('connection:request', async ({from}) => {
    showToast(`${from.name} sent you a connection request.`);
    await refreshConnections();
    if(STATE.currentPage === 'connect') renderConnectMain(document.getElementById('connect-content'));
  });

  STATE.socket.on('connection:accepted', async ({by}) => {
    showToast(`${by.name} accepted the connection request.`);
    await refreshConnections();
    if(STATE.currentPage === 'connect') renderConnectMain(document.getElementById('connect-content'));
  });

  STATE.socket.on('connection:declined', async () => {
    await refreshConnections();
    if(STATE.currentPage === 'connect') renderConnectMain(document.getElementById('connect-content'));
  });

  STATE.socket.on('message:new', (message) => {
    if(STATE.activeChatUserId && [String(message.senderId), String(message.receiverId)].includes(String(STATE.activeChatUserId))){
      appendChatMessage(message);
    }
  });
}

async function callOllama(systemPrompt, userMessage, maxTokens=1500){
  try {
    const fullMessage = `${systemPrompt}\n\nUser: ${userMessage}`;
    const r = await fetch(`${OLLAMA_API}/api/ollama/generate`,{
      method:'POST', // Ensure method is POST
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model: OLLAMA_MODEL,
        prompt: fullMessage,
        stream: false,
        options: { // Move num_predict inside options
          num_predict: maxTokens
        }
      })
    });
    
    if(!r.ok) throw new Error(`Ollama API error: ${r.status}.`);
    const data = await r.json();
    return data.response || '';
  } catch(e){
    console.error('Ollama API error:', e);
    alert(`Error: ${e.message}\n\nCheck if Ollama is running at ${OLLAMA_API}`);
    throw e;
  }
}

async function callOllamaJson(systemPrompt, userMessage, maxTokens=1200){
  const fullMessage = `${systemPrompt}\n\nUser: ${userMessage}`;
  const r = await fetch(`${OLLAMA_API}/api/ollama/generate`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model: OLLAMA_MODEL,
      prompt: fullMessage,
      format: 'json',
      stream: false,
      options: {
        num_predict: maxTokens,
        temperature: 0.45
      }
    })
  });
  if(!r.ok) throw new Error(`Ollama API error: ${r.status}.`);
  const data = await r.json();
  return data.response || '';
}

function getPlanMetaForPlace(name, country, index){
  const palette = ['#E8F6F4','#FCEFE3','#FBEDE8','#EAF1F8','#F2EAF7'];
  const fallback = (getFallbackRecs() || []).find((item) => {
    const sameName = String(item.name || '').toLowerCase() === String(name || '').toLowerCase();
    const sameCountry = String(item.country || '').toLowerCase() === String(country || '').toLowerCase();
    return sameName || (sameCountry && !name);
  });
  const hoursByContinent = {
    'North America': 6,
    'South America': 9,
    'Europe': 8,
    'Asia': 15,
    'Africa': 14,
    'Australia': 18,
    'Antarctica': 20
  };
  return {
    emoji: fallback?.emoji || '✈️',
    bgColor: fallback?.bgColor || palette[index % palette.length],
    flightFrom: 'NYC',
    estFlightHours: fallback?.estFlightHours || hoursByContinent[getRegionForCountry(country)] || 10,
    budgetNote: fallback?.budgetNote || 'Balanced for the preferences in your questionnaire.'
  };
}

function normalizePlanRec(rec, index){
  let name = String(rec?.name || '').trim();
  let country = String(rec?.country || '').trim();
  if(name.includes(',') && !country){
    const parts = name.split(',').map((part) => part.trim()).filter(Boolean);
    if(parts.length >= 2){
      name = parts[0];
      country = parts[parts.length - 1];
    }
  }
  const meta = getPlanMetaForPlace(name, country, index);
  const bestFor = (Array.isArray(rec?.bestFor) ? rec.bestFor : [])
    .map((item) => String(item || '').trim())
    .filter(Boolean)
    .slice(0, 3);
  const highlights = (Array.isArray(rec?.highlights) ? rec.highlights : [])
    .map((item) => String(item || '').trim())
    .filter(Boolean)
    .slice(0, 3);
  const score = Number(rec?.matchScore);
  return {
    name,
    country,
    emoji: meta.emoji,
    bgColor: meta.bgColor,
    whyMatch: String(rec?.whyMatch || 'This destination is a strong fit for your questionnaire.').trim(),
    bestFor: bestFor.length ? bestFor : ['Adventure', 'Culture', 'Food'],
    matchScore: Number.isFinite(score) ? Math.max(72, Math.min(98, Math.round(score))) : 84 - (index * 2),
    flightFrom: 'NYC',
    estFlightHours: Number.isFinite(Number(rec?.estFlightHours)) ? Number(rec.estFlightHours) : meta.estFlightHours,
    highlights: highlights.length ? highlights : ['Strong match on vibe', 'Fits your chosen continent'],
    budgetNote: meta.budgetNote
  };
}

function extractPlanRecs(payload){
  if(Array.isArray(payload)) return payload;
  if(payload && Array.isArray(payload.travelDestinations)) return payload.travelDestinations;
  if(payload && Array.isArray(payload.destinations)) return payload.destinations;
  if(payload && Array.isArray(payload.recommendations)) return payload.recommendations;
  return [];
}

function getContinentRuleExamples(selectedRegions = []){
  const examples = {
    'North America': 'Canada, United States, Mexico',
    'South America': 'Colombia, Brazil, Peru, Argentina, Chile, Bolivia',
    'Europe': 'Portugal, Spain, Italy, France, Croatia, Greece',
    'Asia': 'Japan, Thailand, Indonesia, Vietnam, Singapore, Nepal',
    'Africa': 'Morocco, Egypt, South Africa',
    'Australia': 'Australia, New Zealand, Fiji, French Polynesia',
    'Antarctica': 'research-base and expedition destinations in Antarctica only'
  };

  const area = document.getElementById('q-area');

    area.innerHTML=`

        ${q.sub?`<div class="q-sub">${q.sub}</div>`:''}

          `).join('')}

        <div class="range-labels"><span>${q.unit==='$'?q.unit:''}${q.min}${q.unit!=='$'?q.unit:''}</span><span>${q.unit==='$'?q.unit:''}${q.max}${q.unit!=='$'?q.unit:''}</span></div>
      </div>`;
    planAnswers[q.id] = cur;
  }
}

function updateRange(id, unit, val){
  const d = document.getElementById('range-display-'+id);
  if(d) d.textContent = (unit==='$'?unit:'')+val+(unit!=='$'?unit:'');
  planAnswers[id] = parseInt(val);
}

function selectChip(id, val, type){
  if(type==='single'){
    planAnswers[id] = val;
    document.querySelectorAll(`[id^="chip-${id}-"]`).forEach(c=>c.classList.remove('selected'));
    const chipId = `chip-${id}-${val.replace(/[^a-z0-9]/gi,'_')}`;
    const el = document.getElementById(chipId);
    if(el) el.classList.add('selected');
  } else {
    if(!planAnswers[id]) planAnswers[id]=[];
    if(id === 'region'){
      if(val === 'Anywhere!'){
        planAnswers[id] = ['Anywhere!'];
        document.querySelectorAll(`[id^="chip-${id}-"]`).forEach(c=>c.classList.remove('selected'));
        const chipId = `chip-${id}-${val.replace(/[^a-z0-9]/gi,'_')}`;
        const el = document.getElementById(chipId);
        if(el) el.classList.add('selected');
        return;
      }
      planAnswers[id] = planAnswers[id].filter(option => option !== 'Anywhere!');
      const anywhereChip = document.getElementById(`chip-${id}-Anywhere_`);
      if(anywhereChip) anywhereChip.classList.remove('selected');
    }
    const idx = planAnswers[id].indexOf(val);
    if(idx>=0) planAnswers[id].splice(idx,1);
    else planAnswers[id].push(val);
    const chipId = `chip-${id}-${val.replace(/[^a-z0-9]/gi,'_')}`;
    const el = document.getElementById(chipId);
    if(el) el.classList.toggle('selected', planAnswers[id].includes(val));
  }
}

function planBack(){
  if(planStep>0){planStep--;renderQuestion();}
}

async function planNext(){
  const q = planQuestions[planStep];
  if(q.type==='single'&&!planAnswers[q.id]){
    alert('Please select an option to continue');return;
  }
  if(q.type==='multi'&&(!planAnswers[q.id]||planAnswers[q.id].length===0)){
    alert('Please select at least one option');return;
  }
  if(planStep<planQuestions.length-1){
    planStep++;renderQuestion();
  } else {
    STATE.preferences = planAnswers;
    save();
    await generatePlanRecs();
  }
}

async function legacy_generatePlanRecs(filters){
  const el = document.getElementById('plan-content');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Ollama is finding your perfect destinations…</div>`;
  const prefs = STATE.preferences;
  const filterStr = filters&&filters.length>0?`\nActive filters: ${filters.join(', ')}`:'';
  const prompt = `You are a world-class travel recommendation AI. Based on these preferences, recommend exactly 5 travel destinations.

User preferences:
- Travel style: ${JSON.stringify(prefs.travelStyle)}
- Daily budget per person: $${prefs.budget}
- Trip duration: ${prefs.duration} days
- Climate preference: ${prefs.climate}
- Travelling with: ${prefs.travelWith}
- Continent preference: ${JSON.stringify(prefs.region)}
${filterStr}

Important continent rule:
- If the continent preference is not "Anywhere!", every destination MUST be inside one of the selected continents.
- Do not include destinations outside the selected continent(s) for variety.
- Continent mapping must follow this app's geography:
  North America = Canada, United States, Mexico and nearby North American destinations
  South America = Colombia, Brazil, Peru, Argentina, Chile and nearby South American destinations
  Europe = European countries only
  Asia = Asian countries only
  Africa = African countries only
  Australia = Australia, New Zealand and nearby Pacific destinations
  Antarctica = Antarctic destinations only

Return ONLY a valid JSON array with exactly 5 objects. Each object must have:
{
  "name": "City Name",
  "country": "Country",
  "emoji": "single relevant emoji",
  "bgColor": "one of: #E8F4F0, #F4EEE8, #EEE8F4, #E8EEF4, #F4E8EE",
  "whyMatch": "2 sentences explaining why this matches their preferences",
  "bestFor": ["tag1","tag2","tag3"],
  "matchScore": 85,
  "flightFrom": "NYC",
  "estFlightHours": 8,
  "highlights": ["highlight1","highlight2","highlight3"],
  "budgetNote": "short note on costs"
}

Return ONLY the JSON array, no other text.`;
  try {
    const raw = await callOllama('You are a travel recommendation AI. Always return valid JSON only, no markdown, no explanation.', prompt, 2000);
    let recs;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      recs = JSON.parse(clean);
    } catch(e){
      const match = raw.match(/\[[\s\S]*\]/);
      recs = match ? JSON.parse(match[0]) : legacy_getFallbackRecs();
    }
    const regionFiltered = filterPlanRecsByRegion(recs, prefs.region || []);
    recs = regionFiltered.length ? regionFiltered : legacy_getFallbackRecs();
    const deduped = [];
    const seen = new Set();
    recs.forEach((rec) => {
      const key = `${rec.name}|${rec.country}`.toLowerCase();
      if(!seen.has(key) && deduped.length < 5){
        seen.add(key);
        deduped.push(rec);
      }
    });
    if(deduped.length < 5){
      const fallbackExtras = filterPlanRecsByRegion(legacy_getFallbackRecs(), prefs.region || []);
      fallbackExtras.forEach((rec) => {
        const key = `${rec.name}|${rec.country}`.toLowerCase();
        if(!seen.has(key) && deduped.length < 5){
          seen.add(key);
          deduped.push(rec);
        }
      });
    }
    STATE.planRecs = deduped;
    save();
    renderPlanRecs(el);
  } catch(e){
    STATE.planRecs = filterPlanRecsByRegion(legacy_getFallbackRecs(), prefs.region || []);
    save();
    renderPlanRecs(el);
  }
}

function formatCard(input){
  let v = input.value.replace(/\s+/g,'').replace(/[^0-9]/gi,'');
  let matches = v.match(/\d{4,16}/g);
  let match = (matches&&matches[0])||'';
  let parts = [];
  for(let i=0,len=match.length;i<len;i+=4){parts.push(match.substring(i,i+4));}
  input.value = parts.length?parts.join(' '):input.value;
}

  await new Promise(r=>setTimeout(r,2200));

function buildCompanionCard(c){
  const status = (STATE.connections||{})[c.id];
  const emoji = c.type === 'offering' ? '🤝' : '🔍';
  const bg = c.type === 'offering' ? '#F4EEE8' : '#E8F4F0';
  const tagClass = c.type === 'offering' ? 'tag-amber' : 'tag-teal';
  const tagLabel = c.type === 'offering' ? 'Offering' : 'Seeking';
  const interestTags = (c.interests||[]).map(i=>`<span class="tag tag-rose">${i}</span>`).join('');
  const connectedBadge = status === 'connected' ? `<div class="connected-badge">✓ Connected</div>` : '';
  const realBadge = c.isRealUser ? `<div style="display:inline-flex;align-items:center;gap:4px;background:var(--teal);color:var(--white);font-size:0.7rem;font-weight:700;font-family:'Syne',sans-serif;padding:2px 8px;border-radius:100px;margin-bottom:6px;">● Real User</div>` : '';

  let actionBtns = '';
  if(status === 'connected'){
    actionBtns = `
      <button class="btn btn-teal btn-sm" onclick="openChat('${c.id}')">💬 Message</button>
      <button class="btn btn-outline btn-sm" onclick="viewProfile('${c.id}')">View Profile</button>`;
  } else if(status === 'pending_sent'){
    actionBtns = `
      <button class="btn btn-sm btn-pending" disabled>⏳ Request Sent</button>
      <button class="btn btn-outline btn-sm" onclick="viewProfile('${c.id}')">View Profile</button>`;
  } else if(status === 'pending_received'){
    actionBtns = `
      <button class="btn btn-teal btn-sm" onclick="acceptRequest('${c.id}')">✓ Accept Request</button>
      <button class="btn btn-outline btn-sm" onclick="declineRequest('${c.id}')">✗ Decline</button>`;
  } else {
    actionBtns = `
      <button class="btn btn-sm btn-connect" onclick="sendConnectionRequest('${c.id}')">🤝 Connect</button>
      <button class="btn btn-outline btn-sm" onclick="viewProfile('${c.id}')">View Profile</button>`;
  }

  // avatar initials for real users
  const avatarHtml = c.isRealUser
    ? `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--teal);color:var(--white);font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;">${c.name.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}</div>`
    : emoji;

  return `
    <div class="rec-card" data-id="${c.id}" data-type="${c.type}" data-interests="${(c.interests||[]).join(',')}" data-name="${c.name}" data-dest="${c.destination||''}" data-post="${(c.post||'').replace(/"/g,'&quot;')}">
      <div class="rec-img" style="background:${c.isRealUser?'var(--teal)':bg};font-size:3rem;padding:0;">${avatarHtml}</div>
      <div class="rec-body">
        ${realBadge}${connectedBadge}
        <div class="rec-name">${c.name}${c.age?`, ${c.age}`:''}</div>
        <div class="rec-country">${c.location||''}${c.destination?' → '+c.destination:''}</div>
        <div class="rec-why">${c.post||''}</div>
        <div class="rec-tags">
          <span class="tag ${tagClass}">${tagLabel}</span>
          ${interestTags}
        </div>
        ${c.matchScore?`<div class="match-score">
          <span>Match</span>
          <div class="match-bar"><div class="match-fill" style="width:${c.matchScore}%"></div></div>
          <span>${c.matchScore}%</span>
        </div>`:''}
        <div class="connect-btn-group">${actionBtns}</div>
      </div>
    </div>`;
}

function toggleInbox(){
  const panel = document.getElementById('inbox-panel');
  if(panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function sendConnectionRequest(id){
  if(!STATE.connections) STATE.connections = {};
  STATE.connections[id] = 'pending_sent';
  save();
  // Simulate: after 4–8 seconds the other user might accept (50% chance demo)
  const delay = 4000 + Math.random() * 4000;
  setTimeout(()=>simulateResponse(id), delay);
  renderConnectMain(document.getElementById('connect-content'));
  showToast(`Connection request sent! Waiting for them to accept.`);
}

function simulateResponse(id){
  // Only act if still pending
  if((STATE.connections||{})[id] !== 'pending_sent') return;
  const companion = (STATE.connectData||[]).find(c=>c.id===id);
  if(!companion) return;
  // 60% accept, 40% leave pending (user can see it stays as "Request Sent")
  if(Math.random() > 0.4){
    STATE.connections[id] = 'connected';
    save();
    if(STATE.currentPage === 'connect'){
      renderConnectMain(document.getElementById('connect-content'));
    }
    showToast(`🎉 ${companion.name} accepted your connection request! You can now message them.`);
  }
}

function acceptRequest(id){
  if(!STATE.connections) STATE.connections = {};
  STATE.connections[id] = 'connected';
  // Remove from inbox
  STATE.connectionRequests = (STATE.connectionRequests||[]).filter(r=>r.id!==id);
  save();
  renderConnectMain(document.getElementById('connect-content'));
  const companion = (STATE.connectData||[]).find(c=>c.id===id);
  showToast(`✓ Connected with ${companion ? companion.name : 'them'}! You can now message each other.`);
}

function declineRequest(id){
  if(!STATE.connections) STATE.connections = {};
  delete STATE.connections[id];
  STATE.connectionRequests = (STATE.connectionRequests||[]).filter(r=>r.id!==id);
  save();
  renderConnectMain(document.getElementById('connect-content'));
}

function showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:12px 20px;border-radius:var(--radius-sm);font-size:0.88rem;z-index:500;max-width:360px;text-align:center;box-shadow:var(--shadow-lg);animation:fadeUp 0.3s ease;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 4000);
}

function filterConnect(){
  const search = (document.getElementById('connect-search')||{}).value?.toLowerCase()||'';
  ['connect-grid','connect-grid-real'].forEach(gridId=>{
    const cards = document.querySelectorAll(`#${gridId} .rec-card`);
    cards.forEach(card => {
      const name = (card.dataset.name||'').toLowerCase();
      const dest = (card.dataset.dest||'').toLowerCase();
      const post = (card.dataset.post||'').toLowerCase();
      const type = card.dataset.type;
      const interests = (card.dataset.interests||'').split(',');
      const matchesSearch = !search || name.includes(search) || dest.includes(search) || post.includes(search);
      const matchesFilter = STATE.connectFilters.length === 0 || STATE.connectFilters.includes(type === 'seeking' ? 'Seeking Companions' : 'Offering to Join') || STATE.connectFilters.some(f => interests.includes(f));
      card.style.display = matchesSearch && matchesFilter ? 'block' : 'none';
    });
  });
}

function toggleConnectFilter(f){
  const idx = STATE.connectFilters.indexOf(f);
  if(idx >= 0) STATE.connectFilters.splice(idx, 1);
  else STATE.connectFilters.push(f);
  renderConnectMain(document.getElementById('connect-content'));
}

function submitPost(){
  const type = document.getElementById('post-type').value;
  const dest = document.getElementById('post-dest').value;
  const dates = document.getElementById('post-dates').value;
  const msg = document.getElementById('post-msg').value;
  if(!dest || !msg){alert('Fill in destination and message');return;}
  const newPost = {
    id: 'c' + Date.now(),
    name: STATE.user.name,
    age: 25,
    location: 'Your Location',
    destination: dest,
    dates: dates,
    type: type,
    post: msg,
    interests: ['Culture'],
    matchScore: 95
  };
  STATE.connectData.unshift(newPost);
  save();
  document.querySelector('.modal-overlay').remove();
  renderConnectMain(document.getElementById('connect-content'));
  // Simulate someone sending YOU a connection request after a delay
  const responders = (STATE.connectData||[]).filter(c=>c.id!==newPost.id);
  if(responders.length > 0){
    const responder = responders[Math.floor(Math.random()*responders.length)];
    const delay = 5000 + Math.random()*5000;
    setTimeout(()=>{
      if((STATE.connections||{})[responder.id]) return; // already connected
      STATE.connections[responder.id] = 'pending_received';
      if(!STATE.connectionRequests) STATE.connectionRequests = [];
      if(!STATE.connectionRequests.find(r=>r.id===responder.id)){
        STATE.connectionRequests.push(responder);
      }
      save();
      if(STATE.currentPage === 'connect'){
        renderConnectMain(document.getElementById('connect-content'));
      }
      showToast(`🔔 ${responder.name} wants to connect with you!`);
    }, delay);
  }
}

    showToast('You need to be connected before you can message this person.');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" style="max-width:500px;">

function sendMessage(id){
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg)return;
  const messages = document.getElementById('chat-messages');
  messages.innerHTML += `<div style="margin-bottom:8px;"><strong>You:</strong> ${msg}</div>`;
  input.value = '';
  setTimeout(() => {
    messages.innerHTML += `<div style="margin-bottom:8px;color:var(--ink3);"><strong>${STATE.connectData.find(c => c.id === id).name}:</strong> Thanks for reaching out! Sounds great.</div>`;

  }, 1000);
}

Return ONLY a valid JSON array with exactly 5 UNIQUE objects. Keep the output compact.

{

  "bestFor": ["tag1","tag2","tag3"],
  "matchScore": 85,

  "highlights": ["highlight1","highlight2"]
}

Return ONLY the JSON array, no other text.`;

  try {

    let recs;

Important retry rule:

    }

    if(!Array.isArray(recs)) throw new Error('Plan recommendations were not returned as an array.');

    let normalized = recs
      .map((rec, index) => normalizePlanRec(rec, index))

    let regionFiltered = filterPlanRecsByRegion(normalized, selectedRegions);

    if(!selectedRegions.includes('Anywhere!') && regionFiltered.length < 5){

Your previous answer included destinations outside the allowed continent selection.
Invalid examples: ${invalidExamples || 'none listed'}.

Repair rules:
- Return 5 unique destinations only from ${selectedRegions.join(', ')}.
- If you cannot satisfy the request, still return your 5 best valid destinations from ${selectedRegions.join(', ')}.
- Do not include destinations from any other continent.
- Prefer real cities or well-known travel regions with accurate highlights.`;
      raw = await callOllamaJson('You are a travel recommendation AI. Return valid JSON only.', repairPrompt, 1000);
      recs = extractPlanRecs(JSON.parse(raw.trim()));
      normalized = recs
        .map((rec, index) => normalizePlanRec(rec, index))
        .filter((rec) => rec.name && rec.country);
      regionFiltered = filterPlanRecsByRegion(normalized, selectedRegions);
    }

    const seen = new Set();
    const deduped = [];

    regionFiltered.forEach((rec) => {
      const key = `${rec.name}|${rec.country}`.toLowerCase();
      if(!seen.has(key) && deduped.length < 5){
        seen.add(key);
        deduped.push(rec);
      }
    });

    if(deduped.length < 5){
      throw new Error('Model did not return five valid destinations.');
    }

    STATE.planRecs = deduped;
    save();
    renderPlanRecs(el);

  }
}

function normalizeAndFilterPlanRecs(rawRecs, selectedRegions){
  const normalized = (Array.isArray(rawRecs) ? rawRecs : [])
    .map((rec, index) => normalizePlanRec(rec, index))
    .filter((rec) => rec.name && rec.country);
  const filtered = filterPlanRecsByRegion(normalized, selectedRegions);
  const seen = new Set();
  const deduped = [];
  filtered.forEach((rec) => {
    const key = `${rec.name}|${rec.country}`.toLowerCase();
    if(!seen.has(key)){
      seen.add(key);
      deduped.push(rec);
    }
  });
  return deduped;
}

- Recommend cities, towns, or clearly travelable regions.
- Do not use fake landmarks or inaccurate highlights.
- Do not pad with destinations from other continents just to reach 5.

Return ONLY a valid JSON object with this shape:
{
  "destinations": [
    {
      "name": "City Name",
      "country": "Country",
      "whyMatch": "1 short sentence explaining why this matches their preferences",
      "bestFor": ["tag1","tag2","tag3"],
      "matchScore": 85,
      "estFlightHours": 8,
      "highlights": ["highlight1","highlight2"]
    }
  ]
}

Return exactly 5 UNIQUE destinations.`;

  try {
    let collected = [];
    let attempts = 0;
    let prompt = basePrompt;

    while(collected.length < 5 && attempts < 4){
      attempts += 1;
      const remaining = 5 - collected.length;
      const batch = await requestPlanRecBatch(prompt, attempts === 1 ? 1200 : 1000);
      const normalizedBatch = normalizeAndFilterPlanRecs(batch, selectedRegions);
      const seen = new Set(collected.map((rec) => `${rec.name}|${rec.country}`.toLowerCase()));
      normalizedBatch.forEach((rec) => {
        const key = `${rec.name}|${rec.country}`.toLowerCase();
        if(!seen.has(key) && collected.length < 5){
          seen.add(key);
          collected.push(rec);
        }
      });

      if(collected.length >= 5) break;

      const existing = collected.map((rec) => `${rec.name}, ${rec.country}`).join('; ') || 'none yet';
      prompt = `${basePrompt}

Repair pass ${attempts}:
- You have already suggested: ${existing}
- Return exactly ${remaining} additional UNIQUE destinations only.
- Do not repeat any previously suggested destination.
- Every result must stay inside: ${selectedRegions.join(', ')}.
- Keep highlights short and real.`;
    }

    if(collected.length < 5){
      throw new Error('Model did not return five valid destinations after multiple passes.');
    }

    STATE.planRecs = collected.slice(0, 5);
    save();
    renderPlanRecs(el);
  } catch(e){
    console.error('Plan generation error:', e);
    el.innerHTML = `
      <div class="card" style="max-width:720px;margin:0 auto;text-align:center;">
        <h3 style="margin-bottom:0.75rem;">Couldn&apos;t generate 5 clean destinations yet</h3>
        <p style="color:var(--ink3);line-height:1.7;margin-bottom:1.25rem;">
          The local model still returned too few valid destinations after multiple repair passes. Try again once more.
        </p>
        <button class="btn btn-teal" onclick="generatePlanRecs(STATE.planFilters)">Try again</button>
      </div>`;
  }
}

// ===== INIT =====
load();
updateNav();
renderPlan();
if(STATE.selectedDest){document.getElementById('tab-book').disabled=false;}
if(STATE.bookingRef){document.getElementById('tab-enjoy').disabled=false;}
</script>
<script src="/app.js"></script>
</body>
